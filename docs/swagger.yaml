definitions:
  controllers.OrderInput:
    properties:
      customer_id:
        type: integer
      notes:
        type: string
      order_items:
        items:
          $ref: '#/definitions/controllers.OrderItemInput'
        type: array
      order_type:
        type: string
      scheduled_time:
        type: string
    type: object
  controllers.OrderItemInput:
    properties:
      menu_id:
        type: integer
      options:
        items:
          $ref: '#/definitions/controllers.OrderItemOptionInput'
        type: array
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  controllers.OrderItemOptionInput:
    properties:
      option_value_id:
        type: integer
    type: object
  controllers.StatusInput:
    properties:
      status:
        type: string
    type: object
  models.Category:
    properties:
      created_at:
        type: string
      description:
        description: Short description for the kiosk UI
        type: string
      display_order:
        description: Controls the display order in the frontend
        type: integer
      id:
        type: integer
      image_url:
        description: URL to the category image
        type: string
      name:
        description: Unique display name
        type: string
      updated_at:
        type: string
    type: object
  models.Customer:
    properties:
      created_at:
        type: string
      email:
        description: Optional email for contact
        type: string
      id:
        type: integer
      name:
        description: Customer's full name
        type: string
      phone:
        description: Phone number, used for phone orders and duplicate detection
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
  models.Menu:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_available:
        description: Unavailable menus cannot be ordered
        type: boolean
      menu_products:
        description: Products included in this menu
        items:
          $ref: '#/definitions/models.MenuProduct'
        type: array
      name:
        description: Unique menu name
        type: string
      price:
        description: Fixed combo price in euros
        type: number
      updated_at:
        type: string
    required:
    - name
    - price
    type: object
  models.MenuProduct:
    properties:
      display_order:
        description: Controls display order in the frontend
        type: integer
      id:
        type: integer
      is_optional:
        description: Whether the product can be swapped out
        type: boolean
      menu_id:
        description: FK to Menu — cascade deletes when menu is removed
        type: integer
      product_id:
        description: FK to Products
        type: integer
      quantity:
        description: How many of this product are in the menu
        type: integer
    type: object
  models.OptionValues:
    properties:
      id:
        type: integer
      option_id:
        description: FK to ProductOptions
        type: integer
      option_price:
        description: Additional cost added to the product price
        type: number
      value:
        description: Display label (e.g. "Large")
        type: string
    type: object
  models.Order:
    properties:
      created_at:
        type: string
      created_by:
        allOf:
        - $ref: '#/definitions/models.Users'
        description: Preloaded staff user
      created_by_id:
        description: FK to Users — the staff member who created the order
        type: integer
      customer:
        allOf:
        - $ref: '#/definitions/models.Customer'
        description: Preloaded customer
      customer_id:
        description: Optional FK to Customer — counter orders may have no customer
        type: integer
      id:
        type: integer
      notes:
        description: Free-text notes for the kitchen
        type: string
      order_items:
        description: Line items in this order
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      order_type:
        description: '"counter" (walk-in) or "phone" (call-in)'
        type: string
      scheduled_time:
        description: Requested delivery time, used for preparation sorting
        type: string
      status:
        description: pending, preparing, prepared, delivered, cancelled
        type: string
      total_price:
        description: Server-computed total (sum of all item totals)
        type: number
      updated_at:
        type: string
    type: object
  models.OrderItem:
    properties:
      id:
        type: integer
      item_total:
        description: (UnitPrice + option prices) * Quantity
        type: number
      menu:
        $ref: '#/definitions/models.Menu'
      menu_id:
        description: FK to Menu (nil if this item is a product)
        type: integer
      order_id:
        description: FK to Order
        type: integer
      order_item_options:
        description: Selected options for this item
        items:
          $ref: '#/definitions/models.OrderItemOption'
        type: array
      product:
        $ref: '#/definitions/models.Products'
      product_id:
        description: FK to Products (nil if this item is a menu)
        type: integer
      quantity:
        description: Number of this item ordered
        type: integer
      unit_price:
        description: Price per unit at order time (product price or menu price)
        type: number
    type: object
  models.OrderItemOption:
    properties:
      id:
        type: integer
      option_value:
        $ref: '#/definitions/models.OptionValues'
      option_value_id:
        description: FK to OptionValues
        type: integer
      order_item_id:
        description: FK to OrderItem
        type: integer
      price_applied:
        description: Option price snapshot at order time
        type: number
    type: object
  models.ProductOptions:
    properties:
      id:
        type: integer
      is_required:
        description: Whether the customer must select a value
        type: boolean
      is_unique:
        description: '"single" = pick one, "multiple" = pick many'
        type: string
      name:
        description: Option group name (e.g. "Size")
        type: string
      product_id:
        description: FK to Products
        type: integer
    type: object
  models.Products:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/models.Category'
        description: Preloaded category
      category_id:
        description: FK to Category
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      image_url:
        description: URL to the product image
        type: string
      is_available:
        description: Unavailable products cannot be ordered
        type: boolean
      name:
        description: Unique product name
        type: string
      preparation_time:
        description: Estimated prep time in minutes
        type: integer
      price:
        description: Unit price in euros, used for order price calculation
        type: number
      stock_quantity:
        description: Available stock count
        type: integer
      updated_at:
        type: string
    type: object
  models.Roles:
    properties:
      created_at:
        type: string
      description:
        description: Human-readable description of the role
        type: string
      id:
        type: integer
      permissions:
        description: Free-text permissions field (reserved for future use)
        type: string
      role_name:
        description: Unique role identifier used in authorization checks
        type: string
      updated_at:
        type: string
    type: object
  models.UserInput:
    properties:
      email:
        type: string
      password:
        description: Plain-text password, hashed before storage
        minLength: 6
        type: string
      roles_id:
        description: Must reference an existing role
        type: integer
      username:
        type: string
    required:
    - email
    - password
    type: object
  models.Users:
    properties:
      created_at:
        type: string
      email:
        description: Unique among non-deleted users
        type: string
      id:
        type: integer
      is_active:
        description: Deactivated users cannot log in
        type: boolean
      role:
        allOf:
        - $ref: '#/definitions/models.Roles'
        description: Preloaded role relationship
      roles_id:
        description: FK to Roles — each user has exactly one role
        type: integer
      updated_at:
        type: string
      username:
        description: Display name
        type: string
    required:
    - email
    type: object
info:
  contact: {}
  description: Super Ordening System
  title: WacDo
  version: "1.0"
paths:
  /categories:
    get:
      description: Retrieve a list of all product categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Category'
            type: array
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all categories
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Create a new product category with the provided details
      parameters:
      - description: Category details
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/models.Category'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid data or category already exists
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new category
      tags:
      - Categories
  /categories/{id}:
    delete:
      description: Delete a category by ID (only if not in use by any products)
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Category deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Category still in use
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - Categories
    get:
      description: Retrieve a single category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a category by ID
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Update an existing category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated category details
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/models.Category'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid ID or data
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Category name already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - Categories
  /customers:
