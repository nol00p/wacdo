      tags:
      - Menus
  /menus/products/{id}:
    delete:
      description: Remove a product from a menu by menu product ID
      parameters:
      - description: Menu Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product removed from menu
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Menu product not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove a product from a menu
      tags:
      - Menus
  /options:
    get:
      description: Retrieve a list of all product options
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ProductOptions'
            type: array
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all product options
      tags:
      - Product Options
    post:
      consumes:
      - application/json
      description: Create a new option for a product (e.g. Size, Toppings)
      parameters:
      - description: Option details
        in: body
        name: option
        required: true
        schema:
          $ref: '#/definitions/models.ProductOptions'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ProductOptions'
        "400":
          description: Invalid data or product not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new product option
      tags:
      - Product Options
  /options/{id}:
